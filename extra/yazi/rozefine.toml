perm_read = { fg = "#E9A96E" }
perm_write = { fg = "#E0617A" }
perm_exec = { fg = "#8FCF7A" }

[which]
cols = 3
mask = { bg = "#131618" }
cand = { fg = "#A5E9F5" }
rest = { fg = "#7A878A" }
desc = { fg = "#BFD6D8" }
separator = "  "
separator_style = { fg = "#33383C" }

[confirm]
border = { fg = "#33383C" }
title = { fg = "#A5E9F5" }
btn_yes = { fg = "#181A1C", bg = "#8FCF7A", bold = true }
btn_no = { fg = "#E9F2F2", bg = "#272C2F" }
btn_labels = [ "  Yes  ", "  No  " ]

[spot]
border = { fg = "#33383C" }

[notify]
title_info = { fg = "#A5E9F5" }
title_warn = { fg = "#E9A96E" }
