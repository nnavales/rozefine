normal_alt = { fg = "#A5E9F5", bg = "#1B1E20" }

select_main = { fg = "#181A1C", bg = "#D78CF0", bold = true }
select_alt = { fg = "#D78CF0", bg = "#1B1E20" }

unset_main = { fg = "#181A1C", bg = "#46C2A8", bold = true }
unset_alt = { fg = "#46C2A8", bg = "#1B1E20" }

[indicator]
parent = { fg = "#6E797E" }
current = { bg = "#33383C", bold = true }
preview = { fg = "#6E797E" }
padding = { open = " ", close = " " }

[status]
overall = { fg = "#E9F2F2", bg = "#1F2225" }
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }

progress_label = { fg = "#E9F2F2", bold = true }
progress_normal = { fg = "#46C2A8", bg = "#202325" }
progress_error = { fg = "#E0617A", bg = "#202325" }

perm_sep = { fg = "#33383C" }
