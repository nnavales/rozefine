icon_info = "яБЪ"
icon_warn = "яБ▒"
icon_error = "яБЧ"

[pick]
border = { fg = "#33383C" }
active = { fg = "#E9F2F2", bg = "#33383C" }
inactive = { fg = "#8B9C9F" }

[input]
border = { fg = "#33383C" }
title = { fg = "#A5E9F5" }
value = { fg = "#E9F2F2" }
selected = { bg = "#33383C" }

[cmp]
border = { fg = "#33383C" }
active = { fg = "#E9F2F2", bg = "#33383C" }
